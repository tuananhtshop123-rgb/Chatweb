<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Online Vui Vẻ</title>
    <style>
        body { margin: 0; background: #90EE90; font-family: 'Arial', sans-serif; overflow: hidden; }
        #lobby { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #E0F7FA; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .color-btn { width: 30px; height: 30px; border-radius: 5px; border: none; cursor: pointer; margin: 5px; }
        #game-layer { display: none; }
        #chat-ui { position: absolute; bottom: 20px; left: 20px; width: 250px; }
        #chat-log { height: 120px; background: rgba(0,0,0,0.4); color: white; padding: 5px; border-radius: 5px; overflow-y: auto; font-size: 14px; margin-bottom: 5px;}
        #chat-input { width: 100%; padding: 8px; display: none; border-radius: 5px; }
        /* Nút Chat cho Mobile */
        #chat-btn { position: absolute; bottom: 20px; right: 20px; padding: 15px; background: #333; color: white; border-radius: 50%; border: none; display: none; z-index: 100; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="lobby">
    <div class="box">
        <h1>Vào Game</h1>
        <input id="nameInput" placeholder="Tên của bạn...">
        <div id="colors"></div>
        <button onclick="play()" style="padding: 10px 30px; font-size: 18px; cursor: pointer;">PLAY</button>
    </div>
</div>

<div id="game-layer">
    <canvas id="canvas"></canvas>
    <div id="chat-ui">
        <div id="chat-log"></div>
        <input id="chat-input" placeholder="Gõ chat...">
    </div>
    <button id="chat-btn" onclick="toggleChat()">💬</button>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FF33A8', '#33FFF5', '#F5FF33'];
    let myColor = colors[0];
    let players = {};
    let isTyping = false; 

    // Cấu hình di chuyển cục bộ để chống giật
    let myLocalPos = { x: 400, y: 300 };

    const deco = Array.from({length: 60}, () => ({x: Math.random()*2000, y: Math.random()*2000, type: Math.random()>0.2?'grass':'flower'}));

    colors.forEach(c => {
        let b = document.createElement('button');
        b.className = 'color-btn'; b.style.backgroundColor = c;
        b.onclick = () => myColor = c;
        document.getElementById('colors').appendChild(b);
    });

    function play() {
        const name = document.getElementById('nameInput').value || "Người lạ";
        socket.emit('join', { name, color: myColor });
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-layer').style.display = 'block';
        if('ontouchstart' in window) document.getElementById('chat-btn').style.display = 'block';
    }

    function toggleChat() {
        const input = document.getElementById('chat-input');
        input.style.display = (input.style.display === 'block') ? 'none' : 'block';
        if(input.style.display === 'block') { input.focus(); isTyping = true; }
        else { isTyping = false; }
    }

    const keys = {};
    window.onkeydown = e => {
        if(e.key === 'Enter') { 
            if(isTyping) { socket.emit('chat', document.getElementById('chat-input').value); document.getElementById('chat-input').value=''; toggleChat(); }
            else { toggleChat(); }
        }
        keys[e.key] = true;
    };
    window.onkeyup = e => keys[e.key] = false;

    socket.on('update', data => {
        // Cập nhật tất cả người chơi khác từ server
        players = data;
        // Chỉ cập nhật vị trí của CHÍNH MÌNH từ server nếu cần đồng bộ sau một khoảng thời gian (nhưng ở đây ta tin tưởng local)
    });

    socket.on('newChat', c => { document.getElementById('chat-log').innerHTML += `<div><b>${c.name}:</b> ${c.msg}</div>`; });

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        deco.forEach(d => { ctx.fillStyle = d.type==='grass'?'#228B22':'#FF69B4'; ctx.fillRect(d.x, d.y, 6, 12); });

        // Di chuyển Local (Không đợi server để mượt mà)
        if(!isTyping) {
            if(keys['w']) myLocalPos.y -= 5;
            if(keys['s']) myLocalPos.y += 5;
            if(keys['a']) myLocalPos.x -= 5;
            if(keys['d']) myLocalPos.x += 5;
            // Gửi vị trí lên server
            socket.emit('move', myLocalPos);
        }

        for(let id in players) {
            let p = players[id];
            // Vẽ chính mình dùng myLocalPos thay vì p.x/p.y từ server để không bị giật
            let renderX = (id === socket.id) ? myLocalPos.x : p.x;
            let renderY = (id === socket.id) ? myLocalPos.y : p.y;

            ctx.save();
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            ctx.fillStyle = p.color;
            ctx.fillRect(renderX, renderY, 30, 50);
            ctx.strokeRect(renderX, renderY, 30, 50);
            
            ctx.fillStyle = "black";
            ctx.fillText(p.name, renderX, renderY - 10);

            if(p.chat) {
                ctx.fillStyle = "white"; ctx.fillRect(renderX-5, renderY-40, 60, 20);
                ctx.fillStyle = "black"; ctx.fillText(p.chat, renderX, renderY - 25);
            }
            ctx.restore();
        }
        requestAnimationFrame(draw);
    }
    
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize(); draw();
</script>
</body>
</html>
