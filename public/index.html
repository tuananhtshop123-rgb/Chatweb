<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Survival Pro</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; user-select: none; }
        
        /* Lớp UI Sảnh */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: rgba(15, 20, 15, 0.95); z-index: 20; }
        .panel { background: #222; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; border: 1px solid #444; width: 320px; }
        h1 { margin-top: 0; color: #ff5555; }
        input.txt-input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; background: #333; color: lime; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; margin: 8px 0; background: #4caf50; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
        .btn-secondary { background: #555; } .btn-secondary:hover { background: #666; }
        .btn-danger { background: #dc3545; } .btn-danger:hover { background: #c82333; }
        
        /* Giao diện Game */
        #game-layer { display: none; }
        canvas { display: block; background: #1a231a; cursor: crosshair; }
        
        /* Thanh top UI */
        #top-ui { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        #scoreboard { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid #333; pointer-events: auto; }
        #room-info-box { text-align: right; pointer-events: auto; }
        #room-code-display { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; font-size: 1.2rem; color: #ffeb3b; border: 1px solid #555; margin-bottom: 10px; display: inline-block; }
        
        /* Cảnh báo Wave */
        #wave-announcement { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 3rem; font-weight: bold; color: #ff5555; text-shadow: 0 0 20px red; display: none; z-index: 10; pointer-events: none; }
        
        /* Nút Auto Bắn */
       #auto-shoot-btn { 
    position: absolute; 
    bottom: 20px;      /* Cố định ở đáy màn hình */
    right: 20px;       /* Cố định ở góc phải */
    width: 90px;       /* Chiều rộng nhỏ gọn */
    height: 40px;      /* Chiều cao vừa vặn */
    padding: 0; 
    border-radius: 8px; /* Bo góc vừa phải */
    font-size: 13px;    /* Font chữ nhỏ xinh */
    background: #dc3545; 
    color: white; 
    border: none; 
    box-shadow: 0 0 8px rgba(0,0,0,0.4); 
    z-index: 10; 
    font-weight: bold; 
    pointer-events: auto; 
    cursor: pointer;
    text-align: center;
    line-height: 40px; /* Căn giữa chữ */
}

#auto-shoot-btn.active { 
    background: #28a745; 
    box-shadow: 0 0 12px lime; 
}
        /* Joystick (Chỉ hiện trên Mobile) */
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: none; z-index: 10; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; }

        /* Hộp Chat */
        #chat-container { position: absolute; bottom: 30px; left: 30px; width: 300px; background: rgba(0,0,0,0.5); border-radius: 8px; display: flex; flex-direction: column; z-index: 10; pointer-events: auto; }
        #chat-messages { height: 150px; overflow-y: auto; padding: 10px; font-size: 14px; text-shadow: 1px 1px 2px black; display: flex; flex-direction: column; gap: 5px; }
        #chat-input { background: rgba(0,0,0,0.8); border: none; border-top: 1px solid #444; color: white; padding: 10px; border-radius: 0 0 8px 8px; outline: none; }
        #chat-input:focus { background: rgba(20,20,20,0.9); }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- UI LAYER (SẢNH) -->
    <div id="ui-layer">
        <div id="panel-name" class="panel">
            <h1>ZOMBIE SURVIVAL</h1>
            <input type="text" id="playerName" class="txt-input" placeholder="Nhập tên của bạn..." maxlength="12">
            <button onclick="submitName()">Vào Game</button>
            <div id="name-error" style="color: #ff5555; margin-top: 10px; font-size: 0.9em;"></div>
        </div>

        <div id="panel-menu" class="panel" style="display: none;">
            <h1>CHỌN CHẾ ĐỘ</h1>
            <button onclick="createRoom(1)">Chơi Đơn (Single)</button>
            <button onclick="showPanel('panel-multi')">Chơi Chung (Multi)</button>
        </div>

        <div id="panel-multi" class="panel" style="display: none;">
            <h1>MULTIPLAYER</h1>
            <button onclick="createRoom(5)">Tạo Phòng Mới</button>
            <hr style="border-color: #444; margin: 20px 0;">
            <input type="text" id="roomCodeInput" class="txt-input" placeholder="Nhập mã phòng 5 số..." maxlength="5">
            <button class="btn-secondary" onclick="joinRoom()">Vào Phòng</button>
            <button class="btn-secondary" onclick="showPanel('panel-menu')" style="margin-top: 15px;">Quay lại</button>
            <div id="room-error" style="color: #ff5555; margin-top: 10px; font-size: 0.9em;"></div>
        </div>

        <div id="panel-lobby" class="panel" style="display: none;">
            <h1 id="lobby-code">MÃ PHÒNG: -----</h1>
            <div id="lobby-players" style="background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; min-height: 100px;"></div>
            <button id="btn-start-game" onclick="startGame()" style="display: none;">BẮT ĐẦU CHƠI</button>
            <p id="wait-msg" style="color: #aaa; display: none;">Đang chờ chủ phòng bắt đầu...</p>
            <button class="btn-danger" onclick="leaveRoomUI()" style="margin-top: 10px;">Thoát Phòng</button>
        </div>
    </div>

    <!-- GAME LAYER -->
    <div id="game-layer">
        <div id="top-ui">
            <div id="scoreboard">
                <h3 style="margin:0 0 10px 0; color: #4caf50;">BẢNG XẾP HẠNG TIỀN</h3>
                <div id="scores"></div>
            </div>
            <div id="room-info-box">
                <div id="room-code-display">Phòng: <span id="ingame-room-code"></span></div><br>
                <button class="btn-danger" style="width: auto; padding: 8px 15px; font-size: 14px;" onclick="leaveRoomUI()">Rời Phòng</button>
            </div>
        </div>
        
        <div id="wave-announcement">WAVE 1 BẮT ĐẦU!</div>

        <!-- Chat và Điều khiển -->
        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Nhấn Enter để chat...">
        </div>
        
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        
        <button id="auto-shoot-btn" onclick="toggleAutoShoot()">Auto Bắn: OFF</button>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const socket = io();
        let myId = null;
        let isAutoShoot = false;
        let lastShootTime = 0;
        const SHOOT_COOLDOWN = 500;
        
        // Cấu hình di chuyển và góc ngắm
        let localPlayer = { x: 1500, y: 1500, speed: 3.5, angle: 0 }; // Giảm tốc độ xuống 3.5
        const mapSize = 3000;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        // Logic Âm thanh
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- UI SẢNH ---
        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(panelId).style.display = 'block';
        }
        function submitName() {
            const name = document.getElementById('playerName').value.trim();
            if(name) socket.emit('registerName', name);
        }
        socket.on('nameError', msg => document.getElementById('name-error').innerText = msg);
        socket.on('nameSuccess', () => showPanel('panel-menu'));

        function createRoom(max) { socket.emit('createRoom', { maxPlayers: max }); }
        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim();
            if(code.length === 5) socket.emit('joinRoom', code);
        }
        socket.on('roomError', msg => document.getElementById('room-error').innerText = msg);

        socket.on('roomUpdate', (data) => {
            showPanel('panel-lobby');
            document.getElementById('lobby-code').innerText = `MÃ PHÒNG: ${data.code}`;
            document.getElementById('ingame-room-code').innerText = data.code;
            let html = '';
            for(let id in data.players) {
                let p = data.players[id];
                html += `<div style="color: ${p.color}; font-weight: bold; margin: 5px 0;">${p.name} ${data.host === id ? '👑' : ''}</div>`;
            }
            document.getElementById('lobby-players').innerHTML = html;
            document.getElementById('btn-start-game').style.display = (socket.id === data.host) ? 'block' : 'none';
            document.getElementById('wait-msg').style.display = (socket.id === data.host) ? 'none' : 'block';
        });

        function startGame() { socket.emit('startGame'); }

        // --- RỜI PHÒNG ---
        function leaveRoomUI() {
            socket.emit('leaveRoom');
        }
        socket.on('leftRoom', () => {
            document.getElementById('game-layer').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = ''; // Xóa lịch sử chat
            isAutoShoot = false;
            document.getElementById('auto-shoot-btn').className = '';
            document.getElementById('auto-shoot-btn').innerText = 'Auto Bắn: OFF';
            showPanel('panel-menu');
        });

        // --- CHAT SYSTEM ---
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = chatInput.value.trim();
                if (msg) {
                    socket.emit('sendChat', msg);
                    chatInput.value = '';
                }
                chatInput.blur(); // Bỏ focus sau khi enter
            }
        });

        socket.on('receiveChat', (data) => {
            const el = document.createElement('div');
            el.innerHTML = `<span style="color: ${data.color}; font-weight: bold;">${data.name}:</span> ${data.msg}`;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let players = {}, bullets = [], zombies = [];

        // Hệ thống phím & Chuột
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => { 
            if(document.activeElement === chatInput) return; // Đang chat không di chuyển
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
        });
        window.addEventListener('keyup', e => { 
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; 
        });

        // Cập nhật vị trí chuột để xoay nòng súng
        window.addEventListener('mousemove', e => {
            mouseX = e.clientX; mouseY = e.clientY;
        });

        // Joystick cho Mobile
        let joyMoveX = 0, joyMoveY = 0;
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        if ('ontouchstart' in window) {
            joyZone.style.display = 'block';
            document.getElementById('chat-container').style.bottom = '160px'; // Đẩy chat lên
            
            joyZone.addEventListener('touchmove', e => {
                e.preventDefault();
                let rect = joyZone.getBoundingClientRect();
                let touch = e.touches[0];
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                let dist = Math.hypot(dx, dy);
                let maxDist = 35;
                if(dist > maxDist) { dx = dx * maxDist / dist; dy = dy * maxDist / dist; }
                joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                joyMoveX = dx / maxDist; joyMoveY = dy / maxDist;
            });
            const resetJoy = () => { joyKnob.style.transform = `translate(0px, 0px)`; joyMoveX = 0; joyMoveY = 0; };
            joyZone.addEventListener('touchend', resetJoy);
        }

        socket.on('gameStarted', (initialPlayers) => {
            myId = socket.id; players = initialPlayers;
            localPlayer.x = players[myId].x; localPlayer.y = players[myId].y;
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('game-layer').style.display = 'block';
            resizeCanvas(); requestAnimationFrame(gameLoop);
        });

        // Hệ thống hiển thị Wave
        socket.on('waveInfo', (data) => {
            const ann = document.getElementById('wave-announcement');
            ann.innerText = data.msg;
            ann.style.display = 'block';
            setTimeout(() => { ann.style.display = 'none'; }, 2500);
        });

        socket.on('stateUpdate', data => {
            bullets = data.bullets; zombies = data.zombies;
            for (let id in data.players) {
                if (id !== myId && players[id]) {
                    players[id].x = data.players[id].x; players[id].y = data.players[id].y;
                    players[id].angle = data.players[id].angle; // Nhận góc xoay của bạn bè
                }
                if (players[id]) players[id].money = data.players[id].money;
            }
            updateScoreboard();
        });

        function updateScoreboard() {
            let sorted = Object.values(players).sort((a,b) => b.money - a.money);
            let html = '';
            sorted.forEach(p => {
                html += `<div style="margin: 5px 0;"><span style="color: ${p.color}; font-weight: bold;">${p.name}</span>: <span style="color: gold;">$${p.money}</span></div>`;
            });
            document.getElementById('scores').innerHTML = html;
        }

        window.addEventListener('mousedown', e => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || document.activeElement === chatInput) return;
            if (isAutoShoot) return; 
            shoot(mouseX, mouseY, true);
        });

        function toggleAutoShoot() {
            isAutoShoot = !isAutoShoot;
            const btn = document.getElementById('auto-shoot-btn');
            btn.innerText = `Auto Bắn: ${isAutoShoot ? 'ON' : 'OFF'}`;
            btn.className = isAutoShoot ? 'active' : '';
        }

        function shoot(tx, ty, isScreenCoord = true) {
            const now = Date.now();
            if (now - lastShootTime < SHOOT_COOLDOWN) return;
            lastShootTime = now;

            let angle = localPlayer.angle;
            if (isScreenCoord) {
                angle = Math.atan2(ty - canvas.height/2, tx - canvas.width/2);
            } else {
                angle = Math.atan2(ty - localPlayer.y, tx - localPlayer.x);
            }
            
            playSound('shoot');
            socket.emit('shoot', {
                x: localPlayer.x + Math.cos(angle)*30, // Đạn bay ra từ nòng súng
                y: localPlayer.y + Math.sin(angle)*30,
                vx: Math.cos(angle) * 18,
                vy: Math.sin(angle) * 18,
                angle: angle
            });
        }

        function gameLoop() {
            if (document.getElementById('game-layer').style.display === 'none') return;

            // Xoay nhân vật theo chuột (nếu không auto)
            if (!isAutoShoot) {
                localPlayer.angle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);
            }

            // Di chuyển (PC + Mobile)
            let moved = false;
            if(document.activeElement !== chatInput) {
                if (keys.w) { localPlayer.y -= localPlayer.speed; moved = true; }
                if (keys.s) { localPlayer.y += localPlayer.speed; moved = true; }
                if (keys.a) { localPlayer.x -= localPlayer.speed; moved = true; }
                if (keys.d) { localPlayer.x += localPlayer.speed; moved = true; }
            }
            if (joyMoveX !== 0 || joyMoveY !== 0) {
                localPlayer.x += joyMoveX * localPlayer.speed;
                localPlayer.y += joyMoveY * localPlayer.speed;
                moved = true;
            }

            localPlayer.x = Math.max(20, Math.min(mapSize - 20, localPlayer.x));
            localPlayer.y = Math.max(20, Math.min(mapSize - 20, localPlayer.y));

            if (moved || mouseX || isAutoShoot) {
                socket.emit('playerMove', { x: localPlayer.x, y: localPlayer.y, angle: localPlayer.angle });
            }

            // Auto Bắn
            if (isAutoShoot) {
                let nearestDist = Infinity, nearestZ = null;
                zombies.forEach(z => {
                    let d = Math.hypot(z.x - localPlayer.x, z.y - localPlayer.y);
                    if (d < nearestDist && d < 700) { nearestDist = d; nearestZ = z; }
                });
                if (nearestZ) {
                    localPlayer.angle = Math.atan2(nearestZ.y - localPlayer.y, nearestZ.x - localPlayer.x);
                    shoot(nearestZ.x, nearestZ.y, false);
                }
            }

            // --- VẼ ĐỒ HỌA ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const camX = canvas.width / 2 - localPlayer.x;
            const camY = canvas.height / 2 - localPlayer.y;

            ctx.save();
            ctx.translate(camX, camY);

            // Nền Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
            for(let i=0; i<=mapSize; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, mapSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(mapSize, i); ctx.stroke();
            }
            ctx.strokeStyle = '#555'; ctx.lineWidth = 5; ctx.strokeRect(0, 0, mapSize, mapSize);

            // Lửa trại
            let fireGlow = ctx.createRadialGradient(1500, 1500, 10, 1500, 1500, 300);
            fireGlow.addColorStop(0, 'rgba(255, 100, 0, 0.4)'); fireGlow.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = fireGlow; ctx.beginPath(); ctx.arc(1500, 1500, 300, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff5722'; ctx.beginPath(); ctx.arc(1500, 1500, 15, 0, Math.PI*2); ctx.fill();

            // Vẽ Đạn (Vệt sáng dài)
            bullets.forEach(b => {
                ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle);
                ctx.fillStyle = '#fff9c4'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 10;
                ctx.fillRect(-12, -2, 24, 4); 
                ctx.restore();
            });

            // Vẽ Quái (Có hình khối đơn giản hơn)
            zombies.forEach(z => {
                ctx.save(); ctx.translate(z.x, z.y); 
                if (z.angle) ctx.rotate(z.angle);
                
                // Tay quái chỉa về phía trước
                ctx.fillStyle = '#a00';
                ctx.fillRect(5, -15, 20, 8); // Tay trái
                ctx.fillRect(5, 7, 20, 8);  // Tay phải

                // Đầu quái
                ctx.fillStyle = '#ff4444';
                ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
                
                ctx.restore();
            });

            // Vẽ Người chơi (Có vai, tay, và súng thật)
            for (let id in players) {
                let p = players[id];
                let isMe = (id === myId);
                let x = isMe ? localPlayer.x : p.x;
                let y = isMe ? localPlayer.y : p.y;
                let angle = isMe ? localPlayer.angle : p.angle;

                ctx.save();
                ctx.translate(x, y);
                
                // Vẽ tên (Không bị xoay ngược)
                ctx.fillStyle = 'white'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(p.name, 0, -35);

                ctx.rotate(angle); // Bắt đầu xoay nhân vật

                // 1. Vẽ khẩu súng lục (Dài và hiện đại)
                ctx.fillStyle = '#444'; // Thân súng
                ctx.fillRect(15, 5, 25, 8);
                ctx.fillStyle = '#222'; // Nòng súng
                ctx.fillRect(35, 6, 15, 6);

                // 2. Vẽ hai tay cầm súng
                ctx.fillStyle = p.color; // Cùng màu với thân
                ctx.beginPath(); ctx.arc(20, 13, 7, 0, Math.PI*2); ctx.fill(); // Tay phải giữ cò
                ctx.beginPath(); ctx.arc(30, 4, 7, 0, Math.PI*2); ctx.fill(); // Tay trái đỡ nòng

                // 3. Vẽ vai (Hình Elip)
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.ellipse(0, 0, 16, 24, 0, 0, Math.PI*2); ctx.fill();
                
                // 4. Vẽ đầu (Vòng tròn)
                ctx.fillStyle = '#ffe0bd'; // Màu da
                ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();

                if(isMe) {
                    ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.stroke();
                }

                ctx.restore();
            }

            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
