<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Online Của Bạn</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #87CEEB; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f9ff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .controls-ui { margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; margin-bottom: 10px; }
        .color-btns { display: flex; gap: 5px; margin-bottom: 20px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        
        #game-ui { display: none; }
        canvas { display: block; background: #90EE90; }
        
        #chat-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.5); border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>Chào mừng đến với Zone Game</h1>
        <input type="text" id="username" placeholder="Nhập tên của bạn...">
        <div class="color-btns" id="colorPicker"></div>
        <button onclick="startGame()">PLAY</button>
    </div>

    <div id="game-ui">
        <canvas id="gameCanvas"></canvas>
        <div id="chat-bar">
            <input type="text" id="chatInput" placeholder="Nhập nội dung chat..." onkeydown="handleChat(event)">
        </div>
        <div id="joystick"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
